<!DOCTYPE html>
<html>
    <head>
        <title></title>
    
    
    </head>
    <body>
        <h1>Ajouter un enseignant</h1>

        <form method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Ajouter</button>
        </form>
    </body>
</html>

<style>
    body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 0;
}

h1{
    text-align: center;
    margin-top: 40px;
    color: #333;
}

form{
    width: 400px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

form p{
    margin-bottom: 15px;
}

label{
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea{
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button{
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
}

button:hover{
    background-color: #0056b3;
}
</style>
