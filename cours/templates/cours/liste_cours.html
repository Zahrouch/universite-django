<!DOCTYPE html>
<html>
<head>
    <title>Liste des cours </title>
</head>
<body>

    <h1>Liste des cours git </h1>

    <p>Utilisateur connecté:{{user.username}}</p>

    
    <a href= "{% url 'ajouter_cours' %}"> Ajouter un cours</a>
    <a href="{% url  'deconnexion' %}"> Se déconnecter</a>
    
    <ul>
        {% for c in cours %}
        <li>
            {{ c.titre }} - {{ c.enseignant }} - Crédit: {{ c.credit }} 
            <a href= "{% url 'modifier_cours' c.id %}"> Modifier </a> 
            <a href= "{% url 'supprimer_cours' c.id %}">Supprimer</a>
        </li>
        {% endfor %}
    </ul>
    

</body>
</html>


<style>
    

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 40px;
}

h1{
    text-align: center;
    color: #333;
}

a{
    text-decoration: none;
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
}

a[href*="ajouter"]{
    background-color: #28a745;
    display: inline-block;
    margin-bottom: 20px;
}

a[href*="ajouter"]:hover{
    background-color: #218838;
}

ul{
    list-style: none;
    padding: 0;
    max-width: 600px;
    margin: auto;
}

li{
    background: white;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 6px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

li a{
    margin-left: 8px;
}

a[href*="modifier"]{
    background-color: #007bff;
}

a[href*="modifier"]:hover{
    background-color: #0056b3;
}

a[href*="supprimer"]{
    background-color: #dc3545;
}

a[href*="supprimer"]:hover{
    background-color: #a71d2a;
}

</style>
